cargo-features = ["panic-immediate-abort"]

[package]
name = "scooter-display"
version = "0.1.0"
edition = "2024"

[dependencies]
at32f4xx-hal = { path = "../at32f4xx-hal", features = ["at32f415", "defmt"] }
cortex-m-rt = { version = "0.7.5", features = ["set-sp", "set-vtor"] }
# defmt-rtt = { version = "1.1.0", features = ["disable-blocking-mode"] }
defmt-rtt = { version = "1.1.0", features = [] }
panic-probe = { version = "1.0.0", features = ["defmt", "print-defmt"] }
defmt = "1.0.1"
cortex-m = { version = "0.7.7", features = ["inline-asm", "linker-plugin-lto", "critical-section-single-core"] }
mipidsi = "0.10.0"
embedded-graphics = "0.8.2"
slint = { version = "1.15.1", default-features = false, features = ["compat-1-2", "libm", "renderer-software", "unsafe-single-threaded"] }
embedded-alloc = "0.7.0"
embassy-time-driver = { version = "0.2.2" }
embassy-sync = "0.8.0"
embassy-time-queue-utils = "0.3.0"
critical-section = "1.2.0"
fugit = "0.3.9"
embassy-executor = { version = "0.10.0", features = ["defmt", "platform-cortex-m", "executor-thread", "embassy-time-driver"] }
static_cell = "2.1.1"
embassy-time = { version = "0.5.1", features = ["defmt", "defmt-timestamp-uptime", "tick-hz-32_000"] }

[profile.dev]
codegen-units = 1
debug = 2
debug-assertions = true
incremental = false
lto = 'thin' # true/fat breaks defmt?
opt-level = 'z'
overflow-checks = true
# panic = 'unwind'
# panic = 'immediate-abort'
panic = 'abort'

[profile.release]
codegen-units = 1
debug = 2
debug-assertions = false
incremental = false
lto = 'thin'
opt-level = 'z'
overflow-checks = false
panic = 'abort'

[build-dependencies]
slint-build = "1.15.1"
